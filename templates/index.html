    function createStars() {
        var container = document.getElementById('stars');
        for (var i = 0; i < 100; i++) {
            var star = document.createElement('div');
            star.className = 'star';
            var size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = Math.random() * 3 + 1 + 's';
            star.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(star);
        }
    }
    createStars();

    function updateDateTime() {
        var now = new Date();
        var time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        document.getElementById('datetime').innerHTML = '<i class="far fa-clock"></i> ' + time + ' <i class="far fa-calendar-alt"></i> ' + date;

    updateDateTime();

        if (saved && (saved === "bangladesh" || saved === "india")) {
            regionSelect.value = saved;
        }
    }

    function saveRegion(region) {
        localStorage.setItem("selectedRegion", region);
    }

    regionSelect.addEventListener("change", function() {
        saveRegion(this.value);
    });

    function showPopupToast(message, isSuccess, isLoading) {
        var toast = document.createElement("div");
        toast.className = "popup-toast";
        if (isLoading) {
            toast.innerHTML = '<div class="spinner"></div> <span style="color: #00d4ff">' + message + '</span>';
        } else if (isSuccess) {
            toast.innerHTML = '<i class="fas fa-check-circle" style="color: #00ff88; font-size: 1.2rem;"></i> <span style="color: #00ff88">' + message + '</span>';
        } else {
            toast.innerHTML = '<i class="fas fa-times-circle" style="color: #ff4444; font-size: 1.2rem;"></i> <span style="color: #ff8888">' + message + '</span>';
        }
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 3000);
    }

    function setStatusLoading(regionText, emoteName) {
        statusDiv.innerHTML = '<div class="spinner"></div> <span>' + regionText + ' | SENDING ' + emoteName.toUpperCase() + '...</span>';
    }

        statusDiv.innerHTML = '<i class="fas fa-check-circle success-icon"></i> <span>' + regionText + ' | SUCCESS! ' + emoteName.toUpperCase() + ' SENT</span>';

    }

    function setStatusReady(regionText) {
        statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> <span>' + regionText + ' | READY TO SEND EMOTES</span>';
    }

    async function pasteToClip(fieldId) {
        var field = document.getElementById(fieldId);
        try {
            var text = await navigator.clipboard.readText();
            if (text && text.trim()) field.value = text.trim();
        } catch(err) {
            field.focus();
        }
    }

    function isValidUID(uid) { return /^\d{8,11}$/.test(uid); }
    function isValidTeamCode(tc) { return /^\d{6}$/.test(tc); }

    async function sendEmote(emoteId, emoteName) {
        var teamCode = document.getElementById("teamInput").value.trim();
        var uidsRaw = document.getElementById("uidInput").value.trim();
        var selectedRegion = regionSelect.value;
        var regionText = regionSelect.options[regionSelect.selectedIndex].text;

        if (!teamCode || !uidsRaw) {
            setStatusError(regionText, 'TEAM CODE & UID REQUIRED');
            showPopupToast('TEAM CODE & UID REQUIRED', false, false);
            setTimeout(function() { setStatusReady(regionText); }, 3000);
            return;
        }
        
        if (!isValidTeamCode(teamCode)) {
            setStatusError(regionText, 'INVALID TEAM CODE (6 DIGITS)');
            showPopupToast('INVALID TEAM CODE (6 DIGITS REQUIRED)', false, false);
            setTimeout(function() { setStatusReady(regionText); }, 3000);
            return;
        }

        var uidList = uidsRaw.split(",").map(function(u) { return u.trim(); }).filter(function(u) { return u; });
        var invalid = uidList.filter(function(uid) { return !isValidUID(uid); });
        
        if (invalid.length > 0) {
            setStatusError(regionText, 'INVALID UID (8-11 DIGITS)');
            showPopupToast('INVALID UID: ' + invalid[0] + ' (8-11 DIGITS)', false, false);
            setTimeout(function() { setStatusReady(regionText); }, 3000);
            return;
        }
        
        if (uidList.length > 6) {
            setStatusError(regionText, 'MAX 6 UIDS ALLOWED');
            showPopupToast('MAXIMUM 6 UIDS ALLOWED', false, false);
            setTimeout(function() { setStatusReady(regionText); }, 3000);
            return;
        }

        setStatusLoading(regionText, emoteName);
        showPopupToast('SENDING ' + emoteName.toUpperCase() + '...', false, true);

        var params = new URLSearchParams();
        params.append("teamcode", teamCode);
        params.append("emote_id", emoteId);
        params.append("region", selectedRegion);
        params.append("uids", uidList.join(","));
        
        for (var i = 0; i < uidList.length; i++) {
            params.append("uid" + (i+1), uidList[i]);
        }

        try {
            var res = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            });
            var data = await res.json();

            if (data.success === true || data.status === "success") {
                setStatusSuccess(regionText, emoteName);
                showPopupToast(emoteName.toUpperCase() + ' SENT SUCCESSFULLY!', true, false);
            } else {
                var errMsg = data.message || data.error || "UNKNOWN ERROR";
                setStatusError(regionText, 'FAILED');
                showPopupToast('FAILED: ' + errMsg, false, false);
            }

            setTimeout(function() { setStatusReady(regionText); }, 4000);
        } catch(err) {
            setStatusError(regionText, 'NETWORK ERROR');
            showPopupToast('NETWORK ERROR: ' + err.message, false, false);
            setTimeout(function() { setStatusReady(regionText); }, 4000);
        }
    }

        grid.innerHTML = "";
        for (var i = 0; i < EMOTES.length; i++) {
            var emote = EMOTES[i];
            var card = document.createElement("div");
            card.className = "emote-card";
