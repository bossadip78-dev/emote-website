<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JUBAYER ULTIMATE EMOTE | Free Fire Emote Sender</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, #0a0e2a 0%, #050714 100%);
            color: #fff;
            font-family: 'Poppins', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 15px;
            position: relative;
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); box-shadow: 0 0 2px white; }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 8px #00d4ff, 0 0 12px #0088ff; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 100, 255, 0.15), transparent 60%),
                        radial-gradient(circle at 80% 70%, rgba(0, 200, 255, 0.1), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
        }

        .header h1 {
            font-size: 1.6rem;
            color: #00d4ff;
            text-shadow: 0 0 20px #00d4ff, 0 0 40px #0088ff;
            letter-spacing: 2px;
        }

        .header h1 i {
            margin-right: 10px;
            color: #00d4ff;
        }

        .header p {
            font-size: 0.7rem;
            color: rgba(0, 212, 255, 0.7);
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .tg-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #0088cc, #006699);
            padding: 10px 28px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 20px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 136, 204, 0.5);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .tg-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 136, 204, 0.8);
        }

        .input-card {
            background: rgba(5, 10, 30, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-field {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-field input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
            color: #00d4ff;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-field input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .input-field input::placeholder {
            color: rgba(0, 212, 255, 0.4);
        }

        .paste-btn {
            background: linear-gradient(135deg, #00aaff, #0066cc);
            border: none;
            border-radius: 12px;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }

        .region-select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
            color: #00d4ff;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        .status-bar {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            margin-bottom: 20px;
            font-size: 0.8rem;
            text-align: center;
            border: 1px solid rgba(0, 212, 255, 0.3);
            max-width: 450px;
            width: 100%;
            color: #00d4ff;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #00d4ff;
            border-top-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-icon {
            color: #00ff88;
            font-size: 0.9rem;
        }

        .popup-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #0a0e2a, #050714);
            backdrop-filter: blur(20px);
            padding: 15px 25px;
            border-radius: 20px;
            z-index: 99999;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #00d4ff;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
            animation: popupAnim 0.25s ease;
            white-space: nowrap;
        }

        @keyframes popupAnim {
            from { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .emote-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            width: 100%;
            padding-bottom: 80px;
        }

        .emote-card {
            background: linear-gradient(145deg, rgba(10, 20, 50, 0.8), rgba(5, 10, 30, 0.9));
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .emote-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.25);
        }

        .emote-img {
            width: 55px;
            height: 55px;
            object-fit: contain;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.4));
        }

        .emote-name {
            font-size: 0.7rem;
            font-weight: 600;
            color: #00d4ff;
            display: block;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .emote-name i {
            margin-right: 4px;
            font-size: 0.6rem;
        }

        .emote-id {
            background: linear-gradient(135deg, #00aaff, #0066cc);
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 20px;
            display: inline-block;
        }

        .datetime {
            text-align: center;
            font-size: 0.7rem;
            color: rgba(0, 212, 255, 0.5);
            margin-top: 10px;
        }

        .datetime i {
            margin: 0 5px;
        }

        @media (min-width: 768px) {
            body { padding: 30px; }
            .emote-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; }
            .header h1 { font-size: 2rem; }
        }

        @media (max-width: 550px) {
            .emote-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .input-card { padding: 15px; }
            .popup-toast { padding: 10px 18px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-crown"></i> JUBAYER ULTIMATE EMOTE <i class="fas fa-crown"></i></h1>
        <p><i class="fas fa-gamepad"></i> FREE FIRE ULTIMATE EMOTE COLLECTION <i class="fas fa-star"></i></p>
    </div>

    <a href="https://t.me/XEROX_LIKES" target="_blank" class="tg-link">
        <i class="fab fa-telegram-plane"></i> JOIN TELEGRAM
    </a>

    <div class="input-card">
        <div class="input-group">
            <div class="input-field">
                <i class="fas fa-key" style="color: #00d4ff;"></i>
                <input type="text" id="teamInput" maxlength="6" placeholder="ENTER TEAM CODE (6 DIGIT)">
                <button class="paste-btn" onclick="pasteToClip('teamInput')"><i class="fas fa-paste"></i></button>
            </div>
            <div class="input-field">
                <i class="fas fa-users" style="color: #00d4ff;"></i>
                <input type="text" id="uidInput" placeholder="ENTER UIDS (e.g. 1234567890, 0987654321)">
                <button class="paste-btn" onclick="pasteToClip('uidInput')"><i class="fas fa-paste"></i></button>
            </div>
            <div class="input-field">
                <i class="fas fa-globe" style="color: #00d4ff;"></i>
                <select id="regionSelect" class="region-select">
                    <option value="bangladesh">🇧🇩 BANGLADESH</option>
                    <option value="india">🇮🇳 INDIA</option>
                </select>
            </div>
        </div>
    </div>

    <div class="status-bar" id="statusText">
        <i class="fas fa-check-circle"></i> <span>READY TO SEND EMOTES</span>
    </div>

    <div id="emoteGrid" class="emote-grid"></div>

    <div class="datetime" id="datetime">
        <i class="far fa-clock"></i> --:-- -- <i class="far fa-calendar-alt"></i> --/--/----
    </div>
</div>

<script>
    function createStars() {
        var container = document.getElementById('stars');
        for (var i = 0; i < 100; i++) {
            var star = document.createElement('div');
            star.className = 'star';
            var size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = Math.random() * 3 + 1 + 's';
            star.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(star);
        }
    }
    createStars();

    function updateDateTime() {
        var now = new Date();
        var time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        var date = now.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' });
        document.getElementById('datetime').innerHTML = '<i class="far fa-clock"></i> ' + time + ' <i class="far fa-calendar-alt"></i> ' + date;
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);

    var BACKEND_URL = "/api/send";

    var regionSelect = document.getElementById("regionSelect");
    var statusDiv = document.getElementById("statusText");

    function loadSavedRegion() {
        var saved = localStorage.getItem("selectedRegion");
        if (saved && (saved === "bangladesh" || saved === "india")) {
            regionSelect.value = saved;
        }
    }

    function saveRegion(region) {
        localStorage.setItem("selectedRegion", region);
    }

    regionSelect.addEventListener("change", function() {
        saveRegion(this.value);
    });

    function showPopupToast(message, isSuccess, isLoading) {
        var toast = document.createElement("div");
        toast.className = "popup-toast";
        if (isLoading) {
            toast.innerHTML = '<div class="spinner"></div> <span style="color: #00d4ff">' + message + '</span>';
        } else if (isSuccess) {
            toast.innerHTML = '<i class="fas fa-check-circle" style="color: #00ff88; font-size: 1.2rem;"></i> <span style="color: #00ff88">' + message + '</span>';
        } else {
            toast.innerHTML = '<i class="fas fa-times-circle" style="color: #ff4444; font-size: 1.2rem;"></i> <span style="color: #ff8888">' + message + '</span>';
        }
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 3000);
    }

    function setStatusLoading(regionText, emoteName) {
        statusDiv.innerHTML = '<div class="spinner"></div> <span>' + regionText + ' | SENDING ' + emoteName.toUpperCase() + '...</span>';
    }

    function setStatusSuccess(regionText, emoteName) {
        statusDiv.innerHTML = '<i class="fas fa-check-circle success-icon"></i> <span>' + regionText + ' | SUCCESS! ' + emoteName.toUpperCase() + ' SENT</span>';
    }

    function setStatusError(regionText, errorMsg) {
        statusDiv.innerHTML = '<i class="fas fa-times-circle" style="color: #ff4444;"></i> <span>' + regionText + ' | ' + errorMsg + '</span>';
    }

    function setStatusReady(regionText) {
        statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> <span>' + regionText + ' | READY TO SEND EMOTES</span>';
    }

    async function pasteToClip(fieldId) {
        var field = document.getElementById(fieldId);
        try {
            var text = await navigator.clipboard.readText();
            if (text && text.trim()) field.value = text.trim();
        } catch(err) {
            field.focus();
        }
    }

    function isValidUID(uid) { return /^\d{8,11}$/.test(uid); }
    function isValidTeamCode(tc) { return /^\d{6}$/.test(tc); }

    async function sendEmote(emoteId, emoteName) {
        var teamCode = document.getElementById("teamInput").value.trim();
        var uidsRaw = document.getElementById("uidInput").value.trim();
        var selectedRegion = regionSelect.value;
        var regionText = regionSelect.options[regionSelect.selectedIndex].text;

        if (!teamCode || !uidsRaw) {
            setStatusError(regionText, 'TEAM CODE & UID REQUIRED');
            showPopupToast('TEAM CODE & UID REQUIRED', false, false);
            setTimeout(function() { setStatusReady(regionText); }, 3000);
            return;
        }
        
        if (!isValidTeamCode(teamCode)) {
            setStatusError(regionText, 'INVALID TEAM CODE (6 DIGITS)');
            showPopupToast('INVALID TEAM CODE (6 DIGITS REQUIRED)', false, false);
            setTimeout(function() { setStatusReady(regionText); }, 3000);
            return;
        }

        var uidList = uidsRaw.split(",").map(function(u) { return u.trim(); }).filter(function(u) { return u; });
        var invalid = uidList.filter(function(uid) { return !isValidUID(uid); });
        
        if (invalid.length > 0) {
            setStatusError(regionText, 'INVALID UID (8-11 DIGITS)');
            showPopupToast('INVALID UID: ' + invalid[0] + ' (8-11 DIGITS)', false, false);
            setTimeout(function() { setStatusReady(regionText); }, 3000);
            return;
        }
        
        if (uidList.length > 6) {
            setStatusError(regionText, 'MAX 6 UIDS ALLOWED');
            showPopupToast('MAXIMUM 6 UIDS ALLOWED', false, false);
            setTimeout(function() { setStatusReady(regionText); }, 3000);
            return;
        }

        setStatusLoading(regionText, emoteName);
        showPopupToast('SENDING ' + emoteName.toUpperCase() + '...', false, true);

        var params = new URLSearchParams();
        params.append("teamcode", teamCode);
        params.append("emote_id", emoteId);
        params.append("region", selectedRegion);
        params.append("uids", uidList.join(","));
        
        for (var i = 0; i < uidList.length; i++) {
            params.append("uid" + (i+1), uidList[i]);
        }

        try {
            var res = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            });
            var data = await res.json();

            if (data.success === true || data.status === "success") {
                setStatusSuccess(regionText, emoteName);
                showPopupToast(emoteName.toUpperCase() + ' SENT SUCCESSFULLY!', true, false);
            } else {
                var errMsg = data.message || data.error || "UNKNOWN ERROR";
                setStatusError(regionText, 'FAILED');
                showPopupToast('FAILED: ' + errMsg, false, false);
            }

            setTimeout(function() { setStatusReady(regionText); }, 4000);
        } catch(err) {
            setStatusError(regionText, 'NETWORK ERROR');
            showPopupToast('NETWORK ERROR: ' + err.message, false, false);
            setTimeout(function() { setStatusReady(regionText); }, 4000);
        }
    }

    var CDN_BASE = "https://cdn.jsdelivr.net/gh/ShahGCreator/icon@main/PNG/";
    var EMOTES = [
        {"name": "Cobra Dance", "id": "909000075"},
        {"name": "Evo AK47", "id": "909000063"},
        {"name": "Shotgun Evo", "id": "909035007"},
        {"name": "Scar Evo", "id": "909000068"},
        {"name": "XM8 Evo", "id": "909000085"},
        {"name": "M10 Evo", "id": "909000081"},
        {"name": "Famas Evo", "id": "909000090"},
        {"name": "Ump Evo", "id": "909000098"},
        {"name": "New MP40 Evo", "id": "909000099"},
        {"name": "LOL", "id": "909000002"},
        {"name": "Provoke", "id": "909000003"},
        {"name": "Flowers", "id": "909000010"},
        {"name": "Alok DJ", "id": "909000036"},
        {"name": "Money", "id": "909000038"},
        {"name": "Love Heart", "id": "909000045"},
        {"name": "MP5 Max", "id": "909033002"},
        {"name": "Death Glare", "id": "909035012"},
        {"name": "Group Dance", "id": "909037003"},
        {"name": "Evo Fist", "id": "909037011"},
        {"name": "Booyah", "id": "909000078"},
        {"name": "Fire", "id": "909000133"},
        {"name": "Swaggy", "id": "909036012"},
        {"name": "Dance", "id": "909052004"},
        {"name": "Neon", "id": "909037009"}
    ];

    function loadEmotes() {
        var grid = document.getElementById("emoteGrid");
        grid.innerHTML = "";
        for (var i = 0; i < EMOTES.length; i++) {
            var emote = EMOTES[i];
            var card = document.createElement("div");
            card.className = "emote-card";
            card.onclick = (function(id, name) {
                return function() { sendEmote(id, name); };
            })(emote.id, emote.name);
            card.innerHTML = '<img class="emote-img" src="' + CDN_BASE + emote.id + '.png" onerror="this.src=\'https://ui-avatars.com/api/?name=' + emote.name.substring(0,2) + '&background=00aaff&color=fff&bold=true&size=55\'">' +
                '<span class="emote-name"><i class="fas fa-music"></i> ' + emote.name + '</span>' +
                '<span class="emote-id"><i class="fas fa-hashtag"></i> ' + emote.id + '</span>';
            grid.appendChild(card);
        }
    }
    loadEmotes();
    loadSavedRegion();
</script>
</body>
</html>
